name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Prepare deploy directory
        run: |
          set -e
          rm -rf deploy
          mkdir -p deploy
          # TanStack Start prerender writes static client assets + HTML here.
          if [ -d "dist/client" ]; then
            cp -r dist/client/. deploy/
          elif [ -d ".output/public" ]; then
            cp -r .output/public/. deploy/
          elif [ -d "dist" ]; then
            cp -r dist/. deploy/
          else
            echo "No build output found." >&2
            exit 1
          fi
          # Safety net: if prerender did not produce index.html at the root,
          # create a minimal SPA entry that loads the built client bundle.
          if [ ! -f "deploy/index.html" ]; then
            echo "No prerendered index.html; generating SPA fallback." >&2
            entry=$(ls deploy/assets/entry-client-*.js 2>/dev/null | head -n1 | sed 's|deploy/||')
            css=$(ls deploy/assets/*.css 2>/dev/null | head -n1 | sed 's|deploy/||')
            cat > deploy/index.html <<HTML
<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strefa Dominacji</title>
    ${css:+<link rel="stylesheet" href="./$css" />}
    <link rel="icon" href="./favicon.ico" />
  </head>
  <body>
    <div id="root"></div>
    ${entry:+<script type="module" src="./$entry"></script>}
  </body>
</html>
HTML
          fi
          # Required files that must always be present at the site root.
          touch deploy/.nojekyll
          for f in favicon.ico og-image.png placeholder.svg robots.txt; do
            if [ ! -f "deploy/$f" ] && [ -f "public/$f" ]; then
              cp "public/$f" "deploy/$f"
            fi
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          # Wipe the branch on every deploy so only the built output is
          # present — no source code, no history of previous builds.
          force_orphan: true
